<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UMD Database</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 30px 20px 60px;
      background: linear-gradient(180deg, #050b1a 0%, #0a1a3c 45%, #0d2a5c 100%);
      color: #e8f0ff;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-size: 26px;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(120, 180, 255, 0.7);
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: #7fa8e0;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 30px;
      text-transform: uppercase;
    }
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(120, 180, 255, 0.25);
      border-radius: 12px;
      padding: 14px;
      backdrop-filter: blur(4px);
    }
    #searchInput {
      flex: 1 1 100%;
      padding: 10px 14px;
      font-size: 15px;
      border-radius: 20px;
      border: 1px solid rgba(120, 180, 255, 0.4);
      background: rgba(0, 10, 30, 0.6);
      color: #e8f0ff;
      outline: none;
    }
    #searchInput::placeholder { color: #6b89b8; }
    #searchInput:focus { border-color: #58a6ff; box-shadow: 0 0 8px rgba(88, 166, 255, 0.6); }

    select {
      padding: 7px 10px;
      border-radius: 16px;
      border: 1px solid rgba(120, 180, 255, 0.4);
      background: rgba(0, 10, 30, 0.6);
      color: #e8f0ff;
    }

    label.check-inline {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #cfe0ff;
    }

    .view-toggle button {
      padding: 7px 16px;
      cursor: pointer;
      border-radius: 16px;
      border: 1px solid rgba(120, 180, 255, 0.4);
      background: rgba(0, 10, 30, 0.6);
      color: #cfe0ff;
    }
    .view-toggle button.active {
      background: linear-gradient(180deg, #4d90fe, #1a5fd0);
      border-color: #58a6ff;
      color: white;
      box-shadow: 0 0 10px rgba(88, 166, 255, 0.7);
    }

    #showAllBtn, #exportWishlistBtn, .file-btn, #statsBtn {
      padding: 7px 16px;
      cursor: pointer;
      border-radius: 16px;
      border: 1px solid rgba(120, 180, 255, 0.4);
      background: rgba(0, 10, 30, 0.6);
      color: #cfe0ff;
      display: inline-block;
    }
    #showAllBtn:hover, #exportWishlistBtn:hover, .file-btn:hover, #statsBtn:hover { border-color: #58a6ff; }

    #resultsHeading {
      color: #cfe0ff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      margin: 0 4px 16px;
      padding-top: 2px;
    }

    .empty-message { color: #7fa8e0; text-align: center; margin-top: 30px; }

    /* Movie cards shared */
    .movie-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(120, 180, 255, 0.2);
      border-radius: 10px;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .movie-card:hover {
      border-color: #58a6ff;
      box-shadow: 0 0 14px rgba(88, 166, 255, 0.4);
    }
    .movie-card h3 { margin: 4px 0 2px 0; font-size: 15px; color: #ffffff; }
    .movie-card p { margin: 0; color: #9fb8e0; font-size: 12px; }
    .toggle-item {
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      margin-right: 14px;
      color: #9fb8e0;
      cursor: pointer;
      user-select: none;
    }
    .toggle-item input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-circle {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 2px solid rgba(120, 180, 255, 0.4);
      background: rgba(0, 10, 30, 0.5);
      display: inline-block;
      flex-shrink: 0;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .toggle-item:hover .toggle-circle { border-color: rgba(120, 180, 255, 0.8); }
    .toggle-owned input:checked ~ .toggle-circle {
      background: #58a6ff; border-color: #58a6ff; box-shadow: 0 0 8px rgba(88, 166, 255, 0.8);
    }
    .toggle-watched input:checked ~ .toggle-circle {
      background: #3ec882; border-color: #3ec882; box-shadow: 0 0 8px rgba(62, 200, 130, 0.8);
    }
    .toggle-wishlist input:checked ~ .toggle-circle {
      background: #e6c828; border-color: #e6c828; box-shadow: 0 0 8px rgba(230, 200, 40, 0.8);
    }
    .toggle-owned input:checked ~ .toggle-label { color: #58a6ff; }
    .toggle-watched input:checked ~ .toggle-label { color: #3ec882; }
    .toggle-wishlist input:checked ~ .toggle-label { color: #e6c828; }

    /* List view */
    .list-view { display: block; }
    .list-view .movie-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      margin-bottom: 8px;
    }
    .list-view .cover { width: 46px; height: 64px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .list-view .cover-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; padding: 2px;
      border-radius: 4px;
    }
    .list-view .placeholder-emoji { font-size: 16px; line-height: 1; }
    .list-view .placeholder-title { font-size: 7px; text-align: center; line-height: 1.1; }

    /* Grid view */
    .grid-view {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
    }
    @media (max-width: 800px) {
      .grid-view { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 500px) {
      .grid-view { grid-template-columns: repeat(2, 1fr); }
    }
    .grid-view .movie-card {
      display: flex;
      flex-direction: column;
      padding: 12px;
      height: 100%;
    }
    .grid-view .cover {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .grid-view .cover-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 10px; aspect-ratio: 2 / 3;
      border-radius: 8px; margin-bottom: 10px;
    }
    .grid-view .placeholder-emoji { font-size: 32px; line-height: 1; }
    .grid-view .placeholder-title { font-size: 13px; text-align: center; }
    .grid-view .movie-info {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .grid-view .movie-card h3 {
      font-size: 14px;
      line-height: 1.3;
    }
    .grid-view .checks-row {
      margin-top: auto;
      padding-top: 8px;
    }
    .grid-view .links-row {
      align-self: flex-start;
    }

    .placeholder-default { background: rgba(120, 180, 255, 0.2); color: #cfe0ff; }
    .placeholder-sports { background: rgba(60, 200, 130, 0.2); color: #a8f0cf; }
    .placeholder-wrestling { background: rgba(230, 200, 40, 0.22); color: #ffe98a; }
    .placeholder-music { background: rgba(220, 60, 190, 0.2); color: #ffb3ef; }

    .links-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .imdb-btn, .ebay-btn {
      display: inline-block;
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 12px;
      text-decoration: none;
    }
    .imdb-btn { background: rgba(245, 197, 24, 0.15); border: 1px solid #f5c518; color: #f5c518; }
    .imdb-btn:hover { background: rgba(245, 197, 24, 0.3); }
    .ebay-btn { background: rgba(0, 100, 210, 0.15); border: 1px solid #4da3ff; color: #4da3ff; }
    .ebay-btn:hover { background: rgba(0, 100, 210, 0.3); }
    .trailer-btn { background: rgba(230, 33, 23, 0.15); border: 1px solid #ff5548; color: #ff5548; }
    .trailer-btn:hover { background: rgba(230, 33, 23, 0.3); }

    /* Stats modal */
    #statsModalOverlay {
      position: fixed; inset: 0;
      background: rgba(0, 5, 15, 0.85);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    #statsModalOverlay.visible { display: flex; }
    #statsModalPanel {
      background: linear-gradient(180deg, #0a1a3c, #0d2a5c);
      border: 1px solid rgba(120, 180, 255, 0.4);
      border-radius: 16px;
      padding: 24px;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 30px rgba(88, 166, 255, 0.3);
    }
    .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .stats-header h2 { margin: 0; color: #ffffff; letter-spacing: 2px; text-transform: uppercase; font-size: 18px; }
    #statsCloseBtn {
      background: none; border: 1px solid rgba(120, 180, 255, 0.4); color: #cfe0ff;
      border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 16px; line-height: 1;
    }
    #statsCloseBtn:hover { border-color: #58a6ff; }
    .stats-summary-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat-box {
      flex: 1; min-width: 110px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(120, 180, 255, 0.25);
      border-radius: 10px; padding: 12px; text-align: center;
    }
    .stat-number { font-size: 24px; font-weight: 700; color: #58a6ff; }
    .stat-label { font-size: 11px; color: #9fb8e0; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
    .stats-charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
    @media (max-width: 700px) { .stats-charts-grid { grid-template-columns: 1fr; } }
    .chart-box { background: rgba(255, 255, 255, 0.03); border-radius: 10px; padding: 10px; height: 260px; position: relative; }
    .chart-box.wide { grid-column: 1 / -1; }
    .stats-table { width: 100%; border-collapse: collapse; font-size: 13px; color: #cfe0ff; }
    .stats-table th, .stats-table td { padding: 6px 10px; border-bottom: 1px solid rgba(120, 180, 255, 0.15); text-align: left; }
    .stats-table th { color: #7fa8e0; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      body { padding: 16px 12px 40px; }
      h1 { font-size: 19px; letter-spacing: 3px; }
      .subtitle { font-size: 10px; margin-bottom: 20px; }

      #controls { padding: 10px; gap: 8px; }
      #searchInput { font-size: 16px; padding: 10px 12px; }
      select, #sortFilter {
        flex: 1 1 calc(50% - 8px);
        font-size: 13px;
        padding: 8px;
      }
      .check-inline { flex: 1 1 calc(50% - 8px); font-size: 12px; }
      #showAllBtn, #exportWishlistBtn, .file-btn, #statsBtn {
        flex: 1 1 calc(50% - 8px);
        text-align: center;
        font-size: 12px;
        padding: 8px 10px;
      }
      .view-toggle { flex: 1 1 100%; display: flex; }
      .view-toggle button { flex: 1; }

      #resultsHeading { font-size: 12px; }

      .movie-card h3 { font-size: 13px; }
      .movie-card p { font-size: 11px; }
      .toggle-item { font-size: 11px; margin-right: 8px; }
      .toggle-circle { width: 13px; height: 13px; }
      .imdb-btn, .ebay-btn, .trailer-btn { font-size: 10px; padding: 4px 8px; }

      #statsModalPanel { padding: 14px; }
      .stats-header h2 { font-size: 15px; }
      .stat-box { min-width: 80px; padding: 8px; }
      .stat-number { font-size: 18px; }
      .stat-label { font-size: 9px; }
      .chart-box { height: 200px; padding: 6px; }
      .stats-table { font-size: 11px; }
    }

    /* Extra-narrow phones: stack list-view cards instead of squeezing them side-by-side */
    @media (max-width: 420px) {
      .list-view .movie-card {
        flex-direction: column;
        align-items: flex-start;
      }
      .list-view .cover, .list-view .cover-placeholder {
        width: 100%;
        height: auto;
        aspect-ratio: 2 / 3;
      }
      .list-view .placeholder-emoji { font-size: 28px; }
      .list-view .placeholder-title { font-size: 11px; }
    }
  </style>
</head>
<body>
  <h1>UMD Database</h1>
  <div class="subtitle">Personal Collection</div>

  <div id="controls">
    <input type="text" id="searchInput" placeholder="Search by title...">
    <select id="categoryFilter">
      <option value="all">All Types</option>
    </select>
    <select id="yearFilter">
      <option value="all">All Years</option>
    </select>
    <select id="studioFilter">
      <option value="all">All Studios</option>
    </select>
    <select id="genreFilter">
      <option value="all">All Genres</option>
    </select>
    <select id="formatFilter">
      <option value="all">All Formats</option>
      <option value="Animation">Animation</option>
      <option value="Live Action">Live Action</option>
    </select>
    <select id="sortFilter">
      <option value="none">Sort By...</option>
      <option value="titleAsc">Title (A-Z)</option>
      <option value="titleDesc">Title (Z-A)</option>
      <option value="yearNewest">Year (Newest First)</option>
      <option value="yearOldest">Year (Oldest First)</option>
      <option value="genreAsc">Genre (A-Z)</option>
      <option value="studioAsc">Studio (A-Z)</option>
      <option value="categoryAsc">Type (A-Z)</option>
      <option value="formatAsc">Format (A-Z)</option>
    </select>
    <label class="check-inline">
      <input type="checkbox" id="ownedFilter"> Owned only
    </label>
    <label class="check-inline">
      <input type="checkbox" id="watchedFilter"> Watched only
    </label>
    <label class="check-inline">
      <input type="checkbox" id="wishlistFilter"> Wishlist only
    </label>
    <button id="showAllBtn">Show All</button>
    <button id="exportWishlistBtn">Export Collection</button>
    <label class="file-btn" for="importWishlistInput">Import Collection</label>
    <input type="file" id="importWishlistInput" accept=".csv" style="display: none;">
    <button id="statsBtn">📊 Stats</button>
    <div class="view-toggle">
      <button id="listViewBtn">List</button>
      <button id="gridViewBtn">Grid</button>
    </div>
  </div>

  <div id="resultsHeading"></div>
  <div id="results"></div>

  <div id="statsModalOverlay">
    <div id="statsModalPanel">
      <div class="stats-header">
        <h2>Collection Stats</h2>
        <button id="statsCloseBtn">✕</button>
      </div>

      <div id="statsSummary" class="stats-summary-row"></div>

      <div class="stats-charts-grid">
        <div class="chart-box"><canvas id="statsWatchedChart"></canvas></div>
        <div class="chart-box"><canvas id="statsOwnedWishlistChart"></canvas></div>
        <div class="chart-box"><canvas id="statsGenreOwnedChart"></canvas></div>
        <div class="chart-box"><canvas id="statsGenreWishlistChart"></canvas></div>
        <div class="chart-box wide"><canvas id="statsDecadeChart"></canvas></div>
      </div>

      <div id="statsCategoryTable"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
